version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - POSTGRES_USER=pi
      - POSTGRES_PASSWORD=pi123
      - POSTGRES_DB=procurement
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ../backend:/app
    env_file:
      - ../.env
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A celery_worker.app worker --loglevel=info --queues=enrichment,monitoring
    env_file:
      - ../.env
    depends_on:
      - db
      - redis

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A celery_worker.app beat --loglevel=info
    env_file:
      - ../.env
    depends_on:
      - db
      - redis

volumes:
  db_data:
